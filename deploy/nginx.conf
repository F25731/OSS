server {
    listen 80;
    server_name img.example.com;

    client_max_body_size 50m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # In production, point this alias to the same STORAGE_DIR.
    # If Docker named volumes are used, either bind-mount the image directory
    # to the host or let the Go service serve /i/ through the proxy below.
    location /i/ {
        alias /data/image-bed/images/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
